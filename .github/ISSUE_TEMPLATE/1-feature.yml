name: Feature
description: A request or idea for new functionality
type: Feature
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of what the feature is.
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Explain who needs this and why.
      placeholder: |
        As a [type of user/person]
        I want [some goal/action]
        so that [some reason/benefit]
    validations:
      required: false
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the specific requirements that must be met for this feature to be considered Done.
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3
    validations:
      required: false
  - type: upload
    id: attachments
    attributes:
      label: Attachments
      description: Relevant files to attach.
    validations:
      required: false
